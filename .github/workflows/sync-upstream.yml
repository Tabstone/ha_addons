name: Sync upstream versions

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch upstream versions from Docker Hub
        id: upstream
        run: |
          # Generic function: poll Docker Hub for latest versioned tag
          get_dockerhub_latest() {
            local repo="$1"
            curl -fsSL "https://hub.docker.com/v2/repositories/${repo}/tags/?page_size=50&ordering=last_updated" | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          tags = [r['name'] for r in data.get('results', []) if r['name'] not in ('latest', 'dev', 'nightly', 'beta')]
          semver = [t for t in tags if re.match(r'^v?\d+\.\d+', t)]
          print(semver[0] if semver else (tags[0] if tags else ''))
          " 2>/dev/null || echo ""
          }

          TR_TAG=$(get_dockerhub_latest "wantcat/trendradar")
          echo "trendradar_tag=$TR_TAG" >> "$GITHUB_OUTPUT"
          echo "trendradar=${TR_TAG#v}" >> "$GITHUB_OUTPUT"

          MCP_TAG=$(get_dockerhub_latest "wantcat/trendradar-mcp")
          echo "trendradar_mcp_tag=$MCP_TAG" >> "$GITHUB_OUTPUT"
          echo "trendradar_mcp=${MCP_TAG#v}" >> "$GITHUB_OUTPUT"

          CLI_TAG=$(get_dockerhub_latest "eceasy/cli-proxy-api")
          echo "cli_proxy_api_tag=$CLI_TAG" >> "$GITHUB_OUTPUT"
          echo "cli_proxy_api=${CLI_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update addon metadata
        id: update
        env:
          TRENDRADAR_VERSION: ${{ steps.upstream.outputs.trendradar }}
          TRENDRADAR_TAG: ${{ steps.upstream.outputs.trendradar_tag }}
          TRENDRADAR_MCP_VERSION: ${{ steps.upstream.outputs.trendradar_mcp }}
          TRENDRADAR_MCP_TAG: ${{ steps.upstream.outputs.trendradar_mcp_tag }}
          CLI_PROXY_API_VERSION: ${{ steps.upstream.outputs.cli_proxy_api }}
          CLI_PROXY_API_TAG: ${{ steps.upstream.outputs.cli_proxy_api_tag }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import os

          # (slug, image, version_env, tag_env)
          # version_env: clean version without 'v' prefix (for config.yaml)
          # tag_env: exact Docker Hub tag (for build.yaml)
          updates = [
              ('trendradar',     'wantcat/trendradar',     'TRENDRADAR_VERSION',     'TRENDRADAR_TAG'),
              ('trendradar-mcp', 'wantcat/trendradar-mcp', 'TRENDRADAR_MCP_VERSION', 'TRENDRADAR_MCP_TAG'),
              ('cli-proxy-api',  'eceasy/cli-proxy-api',   'CLI_PROXY_API_VERSION',  'CLI_PROXY_API_TAG'),
          ]
          changed = False
          for slug, image, version_env, tag_env in updates:
              upstream = os.environ.get(version_env, '').strip()
              image_tag = os.environ.get(tag_env, '').strip()
              if not upstream or not image_tag:
                  continue
              wrapper_version = f"{upstream}-1"
              build_file = Path(slug) / 'build.yaml'
              config_file = Path(slug) / 'config.yaml'
              changelog_file = Path(slug) / 'CHANGELOG.md'
              build_text = build_file.read_text()
              new_build = re.sub(rf'{re.escape(image)}:[^\n]+', f'{image}:{image_tag}', build_text)
              if new_build != build_text:
                  build_file.write_text(new_build)
                  changed = True
              config_text = config_file.read_text()
              new_config = re.sub(r'version: "[^"]+"', f'version: "{wrapper_version}"', config_text, count=1)
              if new_config != config_text:
                  config_file.write_text(new_config)
                  changed = True
              changelog_text = changelog_file.read_text()
              heading = f'## {wrapper_version}'
              if heading not in changelog_text:
                  lines = changelog_text.splitlines()
                  insert = [heading, '', f'- Sync upstream image to {image_tag}.', '']
                  changelog_file.write_text('\n'.join(lines[:1] + [''] + insert + lines[1:]).rstrip() + '\n')
                  changed = True
          github_output = Path(os.environ['GITHUB_OUTPUT'])
          with github_output.open('a', encoding='utf-8') as fh:
              fh.write(f'changed={str(changed).lower()}\n')
          PY

      - name: Create pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: sync upstream addon versions"
          branch: chore/sync-upstream-versions
          delete-branch: true
          title: "chore: sync upstream addon versions"
          body: |
            ## Summary
            - sync upstream image versions for all add-ons (source: Docker Hub)
            - update wrapper addon versions
            - append changelog entries
