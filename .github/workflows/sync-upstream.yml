name: Sync upstream versions

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch upstream versions
        id: upstream
        run: |
          echo "trendradar=$(curl -fsSL https://raw.githubusercontent.com/sansan0/TrendRadar/master/version)" >> "$GITHUB_OUTPUT"
          echo "trendradar_mcp=$(curl -fsSL https://raw.githubusercontent.com/sansan0/TrendRadar/master/version_mcp)" >> "$GITHUB_OUTPUT"

          # cli-proxy-api: poll Docker Hub for latest versioned tag (skip 'latest')
          CLI_PROXY_VERSION=$(curl -fsSL "https://hub.docker.com/v2/repositories/eceasy/cli-proxy-api/tags/?page_size=50&ordering=last_updated" | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          tags = [r['name'] for r in data.get('results', []) if r['name'] != 'latest']
          # prefer semver-like tags (vX.Y.Z or X.Y.Z)
          semver = [t for t in tags if re.match(r'^v?\d+\.\d+', t)]
          print(semver[0] if semver else (tags[0] if tags else ''))
          " 2>/dev/null || echo "")
          # strip leading 'v' for addon version, keep original for image tag
          echo "cli_proxy_api_tag=$CLI_PROXY_VERSION" >> "$GITHUB_OUTPUT"
          echo "cli_proxy_api=${CLI_PROXY_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Update addon metadata
        id: update
        env:
          TRENDRADAR_VERSION: ${{ steps.upstream.outputs.trendradar }}
          TRENDRADAR_MCP_VERSION: ${{ steps.upstream.outputs.trendradar_mcp }}
          CLI_PROXY_API_VERSION: ${{ steps.upstream.outputs.cli_proxy_api }}
          CLI_PROXY_API_TAG: ${{ steps.upstream.outputs.cli_proxy_api_tag }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import os

          # image_tag_env: env var holding the exact Docker Hub tag for build.yaml
          # version_env: env var holding the clean version for config.yaml (no 'v' prefix)
          updates = {
              'trendradar': ('wantcat/trendradar', 'TRENDRADAR_VERSION', None),
              'trendradar-mcp': ('wantcat/trendradar-mcp', 'TRENDRADAR_MCP_VERSION', None),
              'cli-proxy-api': ('eceasy/cli-proxy-api', 'CLI_PROXY_API_VERSION', 'CLI_PROXY_API_TAG'),
          }
          changed = False
          for slug, (image, version_env, tag_env) in updates.items():
              upstream = os.environ[version_env].strip()
              if not upstream or upstream == 'latest':
                  continue
              # image_tag: exact tag for Docker Hub; defaults to upstream version
              image_tag = os.environ.get(tag_env, '').strip() if tag_env else upstream
              if not image_tag:
                  image_tag = upstream
              wrapper_version = f"{upstream}-1"
              build_file = Path(slug) / 'build.yaml'
              config_file = Path(slug) / 'config.yaml'
              changelog_file = Path(slug) / 'CHANGELOG.md'
              build_text = build_file.read_text()
              new_build = re.sub(rf'{re.escape(image)}:[^\n]+', f'{image}:{image_tag}', build_text)
              if new_build != build_text:
                  build_file.write_text(new_build)
                  changed = True
              config_text = config_file.read_text()
              new_config = re.sub(r'version: "[^"]+"', f'version: "{wrapper_version}"', config_text, count=1)
              if new_config != config_text:
                  config_file.write_text(new_config)
                  changed = True
              changelog_text = changelog_file.read_text()
              heading = f'## {wrapper_version}'
              if heading not in changelog_text:
                  lines = changelog_text.splitlines()
                  insert = [heading, '', f'- Sync upstream image to {upstream}.', '']
                  changelog_file.write_text('\n'.join(lines[:1] + [''] + insert + lines[1:]).rstrip() + '\n')
                  changed = True
          github_output = Path(os.environ['GITHUB_OUTPUT'])
          with github_output.open('a', encoding='utf-8') as fh:
              fh.write(f'changed={str(changed).lower()}\n')
          PY

      - name: Create pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: sync upstream addon versions"
          branch: chore/sync-upstream-versions
          delete-branch: true
          title: "chore: sync upstream addon versions"
          body: |
            ## Summary
            - sync upstream image versions for all add-ons
            - update wrapper addon versions
            - append changelog entries
