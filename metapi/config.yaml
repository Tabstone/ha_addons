name: Metapi
version: "sha-1"
slug: metapi
description: Metapi upstream image wrapped for Home Assistant with persistent app data
url: https://github.com/Tabstone/ha_addons/tree/main/metapi
arch:
  - amd64
  - aarch64
  - armv7
init: false
map:
  - addon_config:rw
ports:
  4000/tcp: 4000
ports_description:
  4000/tcp: Metapi web UI
webui: http://[HOST]:[PORT:4000]/
options:
  TZ: Asia/Shanghai
  AUTH_TOKEN: ""
  PROXY_TOKEN: ""
  ACCOUNT_CREDENTIAL_SECRET: ""
  CHECKIN_CRON: "0 8 * * *"
  BALANCE_REFRESH_CRON: "0 * * * *"
  env_vars: []
schema:
  TZ: str?
  AUTH_TOKEN: password
  PROXY_TOKEN: password
  ACCOUNT_CREDENTIAL_SECRET: password?
  CHECKIN_CRON: str?
  BALANCE_REFRESH_CRON: str?
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
