name: Mihomo
version: "1.19.21-3"
slug: mihomo
description: Mihomo core wrapped for Home Assistant with persistent config
url: https://github.com/Tabstone/ha_addons/tree/main/mihomo
arch:
  - amd64
  - aarch64
init: false
host_network: true
privileged:
  - ALL
apparmor: false
host_pid: true
host_ipc: true
devices:
  - /dev/net/tun
map:
  - addon_config:rw
ports:
  7890/tcp: 7890
  9090/tcp: 9090
  7890/udp: 7890
ports_description:
  7890/tcp: Mihomo mixed-port
  7890/udp: Mihomo mixed-port (UDP)
  9090/tcp: Mihomo external controller
